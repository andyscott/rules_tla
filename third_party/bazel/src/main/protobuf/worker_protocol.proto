syntax = "proto3";

package blaze.worker;

option java_package = "com.google.devtools.build.lib.worker";

// An input file.
message Input {
  // The path in the file system where to read this input artifact from. This is
  // either a path relative to the execution root (the worker process is
  // launched with the working directory set to the execution root), or an
  // absolute path.
  string path = 1;

  // A hash-value of the contents. The format of the contents is unspecified and
  // the digest should be treated as an opaque token.
  bytes digest = 2;
}

// This represents a single work unit that Blaze sends to the worker.
message WorkRequest {
  repeated string arguments = 1;

  // The inputs that the worker is allowed to read during execution of this
  // request.
  repeated Input inputs = 2;

  // Each WorkRequest must have either a unique request_id or request_id = 0.
  int32 request_id = 3;

  // When true, this is a cancel request for the same request_id.
  bool cancel = 4;

  // Values greater than 0 indicate that the worker may output extra debug information.
  int32 verbosity = 5;

  // The relative directory containing sandboxed inputs and outputs for this request.
  string sandbox_dir = 6;
}

// The worker sends this message to Blaze when it finished its work on the WorkRequest message.
message WorkResponse {
  int32 exit_code = 1;

  // This is printed to the user after the WorkResponse has been received and is supposed to contain
  // compiler warnings / errors etc. - thus we'll use a string type here, which gives us UTF-8
  // encoding.
  string output = 2;

  // This must match the request_id from the corresponding WorkRequest.
  int32 request_id = 3;

  // Indicates that the response was produced due to cancellation.
  bool was_cancelled = 4;
}
